<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Stopwatch - SkillCraft Internship</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>⏱ Pro Stopwatch</h1>

        <p class="subtitle">
            Track precise time intervals with lap analytics
        </p>

        <div id="display">
            00:00:00.000
        </div>

        <div class="buttons">

            <button id="startBtn">
                Start
            </button>

            <button id="pauseBtn">
                Pause
            </button>

            <button id="lapBtn">
                Lap
            </button>

            <button id="resetBtn">
                Reset
            </button>

        </div>

        <div class="stats">

            <div class="stat-card">

                <h4>⚡ Fastest Lap</h4>

                <span id="fastest">
                    00:00:00.000
                </span>

            </div>

            <div class="stat-card">

                <h4>🐢 Slowest Lap</h4>

                <span id="slowest">
                    00:00:00.000
                </span>

            </div>

            <div class="stat-card">

                <h4>📊 Average Lap</h4>

                <span id="average">
                    00:00:00.000
                </span>

            </div>

        </div>

        <div class="laps-container">

            <h2>Lap Records</h2>

            <ul id="laps"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
